<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create AdsTable Account</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#fff;color:#111}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:440px}.logo{text-align:center;font-size:32px;font-weight:950;letter-spacing:-1px;margin-bottom:38px}h1{text-align:center;font-size:40px;letter-spacing:-.05em;margin:0 0 36px}input{width:100%;height:58px;border:1px solid #ddd;border-radius:16px;padding:0 18px;font-size:18px;margin-bottom:16px}.btn{width:100%;height:58px;border:0;border-radius:16px;background:#111;color:#fff;font-size:19px;font-weight:850;margin-top:14px}.legal{text-align:center;color:#777;line-height:1.6;margin-top:28px;font-size:15px}.legal a{color:#111;font-weight:800;text-decoration:none}.links{display:flex;justify-content:center;gap:16px;margin-top:30px;color:#777;font-size:17px}.links a{color:#111;font-weight:800;text-decoration:none}.msg{text-align:center;color:#9b111e;margin-top:14px;font-size:14px}</style></head><body><div class="wrap"><div class="card"><div class="logo">AdsTable</div><h1>Create your AdsTable account</h1><input id="name" placeholder="Name"><input id="email" placeholder="Email address"><input id="password" type="password" placeholder="Password"><button class="btn" onclick="signup()">Create account</button><div id="msg" class="msg"></div><div class="legal">By creating an account, you agree to our<br><a href="/privacy">Privacy Policy</a> and <a href="/terms">Terms of Service</a>.</div><div class="links"><span>Already have an account?</span><a href="/login">Sign In</a></div></div></div><script>let client;async function init(){const cfg=await fetch('/api/public-config').then(r=>r.json());client=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey)}function showMsg(t){msg.textContent=t||''}async function signup(){showMsg('');const {error}=await client.auth.signUp({email:email.value.trim(),password:password.value,options:{data:{name:name.value.trim()}}});if(error){showMsg(error.message);return}location.href='/dashboard'}init()</script></body></html>
