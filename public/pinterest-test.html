<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AdsTable Pinterest Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f6f6;color:#111}.wrap{max-width:980px;margin:0 auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.logo{font-size:28px;font-weight:950;letter-spacing:-1px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:20px;margin-bottom:16px}h1{font-size:34px;letter-spacing:-.05em;margin:0 0 8px}p{color:#666;line-height:1.5}.btn{border:0;background:#111;color:#fff;border-radius:14px;padding:14px 18px;font-weight:900;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.secondary{background:#fff;color:#111;border:1px solid #ddd}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}input,select{height:46px;border:1px solid #ddd;border-radius:14px;padding:0 12px;font-size:15px}input{min-width:260px}pre{white-space:pre-wrap;word-break:break-word;background:#111;color:#fff;border-radius:18px;padding:18px;min-height:260px;overflow:auto;font-size:13px;line-height:1.45}.status{font-weight:850;margin-top:10px}.ok{color:#0f6b37}.err{color:#9b111e}
</style>
</head>
<body><div class="wrap"><div class="top"><div class="logo">AdsTable</div><button class="btn secondary" onclick="location.href='/dashboard'">Back to Dashboard</button></div><div class="card"><h1>Pinterest Ads API Test</h1><p>This page tests <b>/api/pinterest/adaccounts</b> and <b>/api/pinterest/insights</b> with the active Supabase session token.</p><div class="row"><button id="accountsBtn" class="btn" onclick="runPinterestAdAccountsTest()">Run Ad Accounts</button><button class="btn secondary" onclick="copyJson()">Copy JSON</button></div><div class="row"><input id="adAccountId" placeholder="adAccountId e.g. 549770357860"/><select id="level" onchange="updateIdHint()"><option value="campaign">campaign</option><option value="adgroup">adgroup</option><option value="ad">ad</option><option value="account">account</option></select><input id="entityIds" placeholder="campaign_ids e.g. 62719384501"/><select id="dateRange"><option value="last_7d">last_7d</option><option value="today">today</option><option value="yesterday">yesterday</option><option value="last_30d">last_30d</option></select><button id="insightsBtn" class="btn" onclick="runPinterestInsightsTest()">Run Insights</button></div><div id="status" class="status">Waiting...</div></div><div class="card"><pre id="output">{}</pre></div></div>
<script>
let supabaseClient=null,session=null,lastJson={};function setStatus(t,type){const s=document.getElementById('status');s.textContent=t;s.className='status '+(type||'')}function printJson(d){lastJson=d;document.getElementById('output').textContent=JSON.stringify(d,null,2)}function updateIdHint(){const level=document.getElementById('level').value;const input=document.getElementById('entityIds');input.disabled=false;if(level==='campaign')input.placeholder='campaign_ids e.g. 62719384501';if(level==='adgroup')input.placeholder='ad_group_ids e.g. 5491029384';if(level==='ad')input.placeholder='ad_ids e.g. 1102938475';if(level==='account'){input.placeholder='not required for account level';input.disabled=true;input.value=''}}async function init(){try{const cfg=await fetch('/api/public-config').then(r=>r.json());if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){setStatus('Supabase config missing.','err');return}supabaseClient=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const s=await supabaseClient.auth.getSession();session=s.data.session;if(!session){setStatus('Not logged in. Redirecting to login...','err');setTimeout(()=>location.href='/login',900);return}updateIdHint();setStatus('Logged in. Ready to test Pinterest.','ok')}catch(e){setStatus(e.message,'err')}}function authHeaders(){return{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'}}async function runPinterestAdAccountsTest(){const btn=document.getElementById('accountsBtn');btn.disabled=true;btn.textContent='Running...';setStatus('Calling /api/pinterest/adaccounts ...','');try{if(!session||!session.access_token)throw new Error('Missing Supabase session token. Please login again.');const res=await fetch('/api/pinterest/adaccounts',{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||'Pinterest ad accounts test failed.');const first=data.items&&data.items[0]&&data.items[0].id;if(first)document.getElementById('adAccountId').value=first;setStatus('Success. Pinterest ad accounts response received.','ok')}catch(e){setStatus(e.message,'err')}finally{btn.disabled=false;btn.textContent='Run Ad Accounts'}}async function runPinterestInsightsTest(){const btn=document.getElementById('insightsBtn');btn.disabled=true;btn.textContent='Running...';const adAccountId=document.getElementById('adAccountId').value.trim();const level=document.getElementById('level').value;const dateRange=document.getElementById('dateRange').value;const entityIds=document.getElementById('entityIds').value.trim();setStatus('Calling /api/pinterest/insights ...','');try{if(!session||!session.access_token)throw new Error('Missing Supabase session token. Please login again.');if(!adAccountId)throw new Error('adAccountId is required.');let idParam='';if(level==='campaign')idParam='campaign_ids';if(level==='adgroup')idParam='ad_group_ids';if(level==='ad')idParam='ad_ids';if(idParam&&!entityIds)throw new Error(idParam+' is required.');let url='/api/pinterest/insights?adAccountId='+encodeURIComponent(adAccountId)+'&level='+encodeURIComponent(level)+'&date_range='+encodeURIComponent(dateRange);if(idParam)url+='&'+idParam+'='+encodeURIComponent(entityIds);const res=await fetch(url,{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||'Pinterest insights test failed.');setStatus('Success. Pinterest insights response received.','ok')}catch(e){setStatus(e.message,'err')}finally{btn.disabled=false;btn.textContent='Run Insights'}}async function copyJson(){try{await navigator.clipboard.writeText(JSON.stringify(lastJson,null,2));setStatus('JSON copied.','ok')}catch(e){setStatus('Could not copy JSON.','err')}}init();
</script></body></html>
