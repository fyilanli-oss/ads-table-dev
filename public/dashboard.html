<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AdsTable Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f6f6;color:#111}.wrap{max-width:1260px;margin:0 auto;padding:10px}.hidden{display:none!important}.sticky{position:sticky;top:0;z-index:30;background:rgba(246,246,246,.95);backdrop-filter:blur(10px);border-bottom:1px solid #ddd;padding-top:8px}.top{height:48px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px}.menuBtn{border:0;background:transparent;font-size:25px;font-weight:900;cursor:pointer}.logo{font-size:25px;font-weight:950;letter-spacing:-.8px}.ai{border:2px solid #111;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;font-size:12px;font-weight:950}.filters{display:flex;justify-content:space-between;gap:12px;margin:8px 0 10px}.graphBtn{border:0;background:transparent;cursor:pointer;font-size:25px}.select{border:1px solid #ddd;background:#fff;border-radius:15px;padding:10px 12px;font-weight:850}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:10px 0}.kpi{background:#fff;border:1px solid #ddd;border-radius:18px;padding:10px 12px;min-height:78px}.kpiTitle{font-size:12px;color:#777;font-weight:950;text-transform:uppercase}.kpiValue{font-size:23px;font-weight:950;margin-top:7px;letter-spacing:-.6px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:13px;margin-bottom:12px}.tableHeader{display:flex;justify-content:space-between;align-items:center}.tableTitle{font-size:18px;font-weight:950}.tableWrap{overflow:auto;max-height:70vh;border-radius:18px}table{width:100%;border-collapse:separate;border-spacing:0 7px;min-width:1180px}th{text-align:left;font-size:12px;color:#666;text-transform:uppercase;padding:9px 12px;background:#fff;position:sticky;top:0;z-index:5;border-bottom:1px solid #ddd}td{background:#fff;border-top:1px solid #ddd;border-bottom:1px solid #ddd;padding:12px;font-size:14px}.rowCampaign td{font-weight:950}.rowAdset td{background:#fbfbfb}.rowAd td{background:#f7f7f7}.indent1{padding-left:28px}.indent2{padding-left:54px}.empty{padding:46px 18px;text-align:center;color:#777;border:1px dashed #ddd;border-radius:20px;background:#fafafa;margin-top:10px}.empty h3{margin:0;color:#111;font-size:24px;letter-spacing:-.04em}.empty p{margin:12px auto 0;max-width:560px;line-height:1.5}.drawerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:80}.drawer{position:fixed;top:0;left:0;width:330px;max-width:88vw;height:100vh;background:#fff;z-index:90;box-shadow:8px 0 28px rgba(0,0,0,.18);padding:20px 24px;overflow:auto}.drawerHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.drawerTitle{font-size:24px;font-weight:950}.closeBtn{border:0;background:transparent;font-size:28px;cursor:pointer}.section{font-size:12px;text-transform:uppercase;color:#777;font-weight:950;margin:14px 0 8px}.platformLine{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0}.platformLine b{font-size:14px}.action{font-size:12px;border:1px solid #ddd;background:#fff;border-radius:10px;padding:7px 9px;font-weight:850;cursor:pointer}.connect{background:#111;color:#fff;border-color:#111}.pending{background:#eee;color:#777;border-color:#eee;cursor:not-allowed}.menuItem{border:0;background:transparent;padding:9px 0;font-weight:850;text-align:left;font-size:15px;color:#111;display:block;cursor:pointer}.aiBox{background:#f7f7f7;border:1px solid #e7e7e7;border-radius:16px;padding:12px;margin:10px 0}.sep{height:1px;background:#e5e5e5;margin:12px 0}@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}table{min-width:1100px}}@media(max-width:420px){.wrap{padding:9px}.logo{font-size:22px}.select{min-width:104px;padding:9px;font-size:12px}.kpi{min-height:72px;padding:9px}.kpiValue{font-size:21px}.drawer{width:82vw}}
</style>
</head>
<body>
<div id="drawerOverlay" class="drawerOverlay hidden" onclick="closeMenu()"></div>
<div id="drawer" class="drawer hidden">
  <div class="drawerHead"><div class="drawerTitle">AdsTable</div><button class="closeBtn" onclick="closeMenu()">×</button></div>
  <div class="section">Platforms</div><div id="platformLines"></div>
  <div class="aiBox"><b>+ AI Insights Coming Soon</b><div style="display:grid;gap:6px;margin-top:9px;color:#666;font-size:13px;font-weight:750"><span>Campaign Level</span><span>Product Level</span><span>Keyword Level</span></div></div>
  <button class="menuItem">FAQ</button><button class="menuItem">Help</button><button class="menuItem">Contact Us</button><div class="sep"></div><button class="menuItem">My Account</button><button class="menuItem" onclick="logout()">Log Out</button>
</div>
<div class="wrap">
  <div class="sticky"><div class="top"><div class="brand"><button class="menuBtn" onclick="openMenu()">☰</button><div class="logo">AdsTable</div></div><div class="ai">AI</div></div><div class="filters"><button class="graphBtn" onclick="loadMetaData()">⌁</button><select id="dateRange" class="select" onchange="loadMetaData()"><option value="last_7d">Last 7 Days</option><option value="today">Today</option><option value="yesterday">Yesterday</option><option value="last_30d">Last 30 Days</option></select></div></div>
  <div id="kpiGrid" class="kpis"></div>
  <div class="card"><div class="tableHeader"><div class="tableTitle">Performance Table</div><button class="action" onclick="loadMetaData()">Refresh</button></div><div class="tableWrap"><table><thead><tr><th>Name</th><th>Spend</th><th>Imp</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th><th>Link Click</th><th>LPV</th><th>Cost/LPV</th><th>CVR Ranking</th><th>ROAS</th></tr></thead><tbody id="tbody"></tbody></table></div><div id="emptyState" class="empty"><h3>No advertising data yet</h3><p>Connect Meta. AdsTable will load Campaign → Adset → Ad metrics from your Meta ad account.</p></div></div>
</div>
<script>
let supabaseClient=null,session=null,currentStatus={meta:false,google:false,pinterest:false,tiktok:false},metaAccountId=null;
function fmtMoney(v,c){if(v===null||v===undefined||Number.isNaN(Number(v)))return 'N/A';return (c?c+' ':'')+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtNum(v){if(v===null||v===undefined||Number.isNaN(Number(v)))return 'N/A';return Number(v).toLocaleString('en-US')}
function fmtPct(v){if(v===null||v===undefined||Number.isNaN(Number(v)))return 'N/A';return Number(v).toFixed(2)+'%'}
async function authHeader(){return {'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'}}
async function boot(){const cfg=await fetch('/api/public-config').then(r=>r.json());supabaseClient=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const s=await supabaseClient.auth.getSession();session=s.data.session;if(!session){location.href='/login';return}await loadStatus();renderPlatformConnections();renderZeroDashboard();if(currentStatus.meta)await discoverMetaAccountAndLoad()}
async function loadStatus(){try{const res=await fetch('/api/unified/status',{headers:await authHeader()});if(res.ok)currentStatus=await res.json()}catch(e){}}
function platformAction(label,key,url){const connected=!!currentStatus[key];if(key==='tiktok')return `<div class="platformLine"><b>${label}</b><button class="action pending" disabled>Pending</button></div>`;if(connected)return `<div class="platformLine"><b>${label}</b><button class="action" onclick="disconnectPlatform('${key}',this)">Disconnect</button></div>`;const href=`${url}?user_id=${encodeURIComponent(session.user.id)}`;return `<div class="platformLine"><b>${label}</b><button class="action connect" onclick="location.href='${href}'">Connect</button></div>`}
function renderPlatformConnections(){platformLines.innerHTML=[platformAction('Meta Ads','meta','/auth/meta'),platformAction('Google Ads','google','/auth/google'),platformAction('Pinterest Ads','pinterest','/auth/pinterest'),platformAction('TikTok Ads','tiktok','#')].join('')}
async function disconnectPlatform(platform,btn){if(!confirm('Disconnect '+platform+'?'))return;btn.disabled=true;btn.textContent='Disconnecting...';try{const res=await fetch('/api/connections/'+platform+'/disconnect',{method:'POST',headers:await authHeader()});if(!res.ok)throw new Error('Disconnect failed');await loadStatus();renderPlatformConnections();renderZeroDashboard()}catch(e){alert(e.message);btn.disabled=false;btn.textContent='Disconnect'}}
function renderZeroDashboard(){const kpis=[['Spend','TRY 0.00'],['Impressions','0'],['Clicks','0'],['LPV','0'],['CTR','0.00%'],['CPC','TRY 0.00'],['ROAS','N/A'],['CVR Ranking','N/A']];kpiGrid.innerHTML=kpis.map(([t,v])=>`<div class="kpi"><div class="kpiTitle">${t}</div><div class="kpiValue">${v}</div></div>`).join('');tbody.innerHTML='';emptyState.classList.remove('hidden')}
async function discoverMetaAccountAndLoad(){try{const data=await fetch('/api/meta/adaccounts',{headers:await authHeader()}).then(r=>r.json());const account=(data.accounts||[])[0];if(account&&account.id){metaAccountId=account.id;await loadMetaData()}}catch(e){emptyState.querySelector('p').textContent=e.message}}
async function getInsights(level){const preset=document.getElementById('dateRange').value||'last_7d';const url=`/api/meta/insights?adAccountId=${encodeURIComponent(metaAccountId)}&level=${level}&date_preset=${preset}`;const res=await fetch(url,{headers:await authHeader()});const data=await res.json();if(!res.ok)throw new Error(data.error||'Meta insights failed');return data.rows||[]}
async function loadMetaData(){if(!metaAccountId){await discoverMetaAccountAndLoad();return}try{emptyState.classList.add('hidden');const [campaigns,adsets,ads]=await Promise.all([getInsights('campaign'),getInsights('adset'),getInsights('ad')]);renderMetaRows(campaigns,adsets,ads)}catch(e){emptyState.classList.remove('hidden');emptyState.querySelector('p').textContent=e.message}}
function renderMetaRows(campaigns,adsets,ads){const currency=(campaigns[0]&&campaigns[0].currency)||'';const total=campaigns.reduce((a,r)=>({spend:a.spend+(r.spend||0),imp:a.imp+(r.impressions||0),clicks:a.clicks+(r.clicks||0),lpv:a.lpv+(r.landing_page_views||0)}),{spend:0,imp:0,clicks:0,lpv:0});const ctr=total.imp?total.clicks/total.imp*100:0;const cpc=total.clicks?total.spend/total.clicks:0;const cvrRank=(campaigns[0]&&campaigns[0].conversion_rate_ranking)||'N/A';kpiGrid.innerHTML=[['Spend',fmtMoney(total.spend,currency)],['Impressions',fmtNum(total.imp)],['Clicks',fmtNum(total.clicks)],['LPV',fmtNum(total.lpv)],['CTR',fmtPct(ctr)],['CPC',fmtMoney(cpc,currency)],['ROAS','N/A'],['CVR Ranking',cvrRank]].map(([t,v])=>`<div class="kpi"><div class="kpiTitle">${t}</div><div class="kpiValue">${v}</div></div>`).join('');let html='';campaigns.forEach(c=>{html+=rowHtml(c,c.campaign_name||'Campaign','rowCampaign','');adsets.filter(a=>a.campaign_id===c.campaign_id).forEach(a=>{html+=rowHtml(a,a.adset_name||'Adset','rowAdset','indent1');ads.filter(ad=>ad.adset_id===a.adset_id).forEach(ad=>html+=rowHtml(ad,ad.ad_name||'Ad','rowAd','indent2'))})});tbody.innerHTML=html;emptyState.classList.toggle('hidden',html.length>0)}
function rowHtml(r,name,cls,indent){const cur=r.currency||'';return `<tr class="${cls}"><td class="${indent}">${name}</td><td>${fmtMoney(r.spend,cur)}</td><td>${fmtNum(r.impressions)}</td><td>${fmtNum(r.reach)}</td><td>${fmtNum(r.clicks)}</td><td>${fmtPct(r.ctr)}</td><td>${fmtMoney(r.cpc,cur)}</td><td>${fmtNum(r.link_clicks)}</td><td>${fmtNum(r.landing_page_views)}</td><td>${fmtMoney(r.cost_per_landing_page_view,cur)}</td><td>${r.conversion_rate_ranking||'N/A'}</td><td>N/A</td></tr>`}
function openMenu(){drawerOverlay.classList.remove('hidden');drawer.classList.remove('hidden')}function closeMenu(){drawerOverlay.classList.add('hidden');drawer.classList.add('hidden')}async function logout(){await supabaseClient.auth.signOut();location.href='/login'}
boot();
</script>
</body>
</html>
