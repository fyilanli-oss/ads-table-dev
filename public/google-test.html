<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>AdsTable Google Test</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f6f6;color:#111}.wrap{max-width:980px;margin:0 auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.logo{font-size:28px;font-weight:950;letter-spacing:-1px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:20px;margin-bottom:16px}h1{font-size:34px;letter-spacing:-.05em;margin:0 0 8px}p{color:#666;line-height:1.5}.btn{border:0;background:#111;color:#fff;border-radius:14px;padding:14px 18px;font-weight:900;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.secondary{background:#fff;color:#111;border:1px solid #ddd}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}input,select{height:46px;border:1px solid #ddd;border-radius:14px;padding:0 12px;font-size:15px}input{min-width:260px}pre{white-space:pre-wrap;word-break:break-word;background:#111;color:#fff;border-radius:18px;padding:18px;min-height:240px;overflow:auto;font-size:13px;line-height:1.45}.status{font-weight:850;margin-top:10px}.ok{color:#0f6b37}.err{color:#9b111e}</style></head><body><div class="wrap"><div class="top"><div class="logo">AdsTable</div><button class="btn secondary" onclick="location.href='/dashboard'">Back to Dashboard</button></div><div class="card"><h1>Google Ads API Test</h1><p>Customers and insights tests use the active Supabase session token.</p><div class="row"><button id="customersBtn" class="btn" onclick="runGoogleCustomersTest()">Run Customers</button><button class="btn secondary" onclick="copyJson()">Copy JSON</button></div><div class="row"><input id="customerId" placeholder="customerId e.g. 1234567890"/><input id="loginCustomerId" placeholder="loginCustomerId optional"/><select id="level"><option value="campaign">campaign</option><option value="adgroup">adgroup</option><option value="ad">ad</option></select><select id="dateRange"><option value="last_7d">last_7d</option><option value="today">today</option><option value="yesterday">yesterday</option><option value="last_30d">last_30d</option></select><button id="insightsBtn" class="btn" onclick="runGoogleInsightsTest()">Run Insights</button></div><div id="status" class="status">Waiting...</div></div><div class="card"><pre id="output">{}</pre></div></div><script>let supabaseClient=null,session=null,lastJson={};function setStatus(t,type){const s=document.getElementById("status");s.textContent=t;s.className="status "+(type||"")}function printJson(d){lastJson=d;document.getElementById("output").textContent=JSON.stringify(d,null,2)}async function init(){try{const cfg=await fetch("/api/public-config").then(r=>r.json());if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){setStatus("Supabase config missing.","err");return}supabaseClient=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const s=await supabaseClient.auth.getSession();session=s.data.session;if(!session){setStatus("Not logged in. Redirecting...","err");setTimeout(()=>location.href="/login",900);return}setStatus("Logged in. Ready.","ok")}catch(e){setStatus(e.message,"err")}}function authHeaders(){return{"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json"}}async function runGoogleCustomersTest(){const btn=document.getElementById("customersBtn");btn.disabled=true;btn.textContent="Running...";setStatus("Calling /api/google/customers ...","");try{const res=await fetch("/api/google/customers",{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Customers test failed");const first=data.customers&&data.customers[0]&&data.customers[0].customerId;if(first)document.getElementById("customerId").value=first;setStatus("Success. Customers received.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Run Customers"}}async function runGoogleInsightsTest(){const btn=document.getElementById("insightsBtn");btn.disabled=true;btn.textContent="Running...";const customerId=document.getElementById("customerId").value.trim();const loginCustomerId=document.getElementById("loginCustomerId").value.trim();const level=document.getElementById("level").value;const dateRange=document.getElementById("dateRange").value;setStatus("Calling /api/google/insights ...","");try{if(!customerId)throw new Error("customerId is required");let url="/api/google/insights?customerId="+encodeURIComponent(customerId)+"&level="+encodeURIComponent(level)+"&date_range="+encodeURIComponent(dateRange);if(loginCustomerId)url+="&loginCustomerId="+encodeURIComponent(loginCustomerId);const res=await fetch(url,{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Insights test failed");setStatus("Success. Insights received.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Run Insights"}}async function copyJson(){try{await navigator.clipboard.writeText(JSON.stringify(lastJson,null,2));setStatus("JSON copied.","ok")}catch(e){setStatus("Could not copy JSON.","err")}}init();</script></body></html>
