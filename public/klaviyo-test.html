<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>AdsTable Klaviyo Test</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f6f6;color:#111}.wrap{max-width:980px;margin:0 auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.logo{font-size:28px;font-weight:950;letter-spacing:-1px}.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:20px;margin-bottom:16px}h1{font-size:34px;letter-spacing:-.05em;margin:0 0 8px}p{color:#666;line-height:1.5}.btn{border:0;background:#111;color:#fff;border-radius:14px;padding:14px 18px;font-weight:900;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.secondary{background:#fff;color:#111;border:1px solid #ddd}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}input,select{height:46px;border:1px solid #ddd;border-radius:14px;padding:0 12px;font-size:15px}input{min-width:260px}pre{white-space:pre-wrap;word-break:break-word;background:#111;color:#fff;border-radius:18px;padding:18px;min-height:260px;overflow:auto;font-size:13px;line-height:1.45}.status{font-weight:850;margin-top:10px}.ok{color:#0f6b37}.err{color:#9b111e}</style></head><body><div class="wrap"><div class="top"><div class="logo">AdsTable</div><button class="btn secondary" onclick="location.href='/dashboard'">Back to Dashboard</button></div><div class="card"><h1>Klaviyo API Test</h1><p>This page calls Klaviyo endpoints with the active Supabase session token.</p><div class="row"><button id="statusBtn" class="btn" onclick="runKlaviyoStatusTest()">Run Status</button><button id="campaignsBtn" class="btn secondary" onclick="runKlaviyoCampaignsTest()">Run Campaigns</button><button class="btn secondary" onclick="copyJson()">Copy JSON</button></div><div class="row"><select id="dateRange"><option value="last_7d">last_7d</option><option value="today">today</option><option value="yesterday">yesterday</option><option value="last_30d">last_30d</option></select><input id="limit" placeholder="limit e.g. 25" value="25"/><button id="insightsBtn" class="btn" onclick="runKlaviyoInsightsTest()">Run Insights</button></div><div class="row"><input id="estimatedMonthlySpend" placeholder="Estimated Monthly Klaviyo Spend"/><select id="spendCurrency"><option value="USD">USD</option><option value="TRY">TRY</option><option value="EUR">EUR</option></select><button id="settingsBtn" class="btn secondary" onclick="saveKlaviyoSettings()">Save Setup</button></div><div id="status" class="status">Waiting...</div></div><div class="card"><pre id="output">{}</pre></div></div><script>let supabaseClient=null,session=null,lastJson={};function setStatus(t,type){const s=document.getElementById("status");s.textContent=t;s.className="status "+(type||"")}function printJson(d){lastJson=d;document.getElementById("output").textContent=JSON.stringify(d,null,2)}async function init(){try{const cfg=await fetch("/api/public-config").then(r=>r.json());if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){setStatus("Supabase config missing.","err");return}supabaseClient=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const s=await supabaseClient.auth.getSession();session=s.data.session;if(!session){setStatus("Not logged in. Redirecting to login...","err");setTimeout(()=>location.href="/login",900);return}setStatus("Logged in. Ready to test Klaviyo.","ok")}catch(e){setStatus(e.message,"err")}}function authHeaders(){return{"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json"}}async function runKlaviyoStatusTest(){const btn=document.getElementById("statusBtn");btn.disabled=true;btn.textContent="Running...";setStatus("Calling /api/klaviyo/status ...","");try{const res=await fetch("/api/klaviyo/status",{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Klaviyo status test failed.");if(data.estimatedMonthlySpend)document.getElementById("estimatedMonthlySpend").value=data.estimatedMonthlySpend;if(data.spendCurrency)document.getElementById("spendCurrency").value=data.spendCurrency;setStatus("Success. Klaviyo status received.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Run Status"}}async function saveKlaviyoSettings(){const btn=document.getElementById("settingsBtn");btn.disabled=true;btn.textContent="Saving...";setStatus("Calling /api/klaviyo/settings ...","");try{const estimatedMonthlySpend=Number(document.getElementById("estimatedMonthlySpend").value);const spendCurrency=document.getElementById("spendCurrency").value;const res=await fetch("/api/klaviyo/settings",{method:"POST",headers:authHeaders(),body:JSON.stringify({estimatedMonthlySpend,spendCurrency})});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Klaviyo settings save failed.");setStatus("Success. Klaviyo setup saved.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Save Setup"}}async function runKlaviyoCampaignsTest(){const btn=document.getElementById("campaignsBtn");btn.disabled=true;btn.textContent="Running...";const dateRange=document.getElementById("dateRange").value;setStatus("Calling /api/klaviyo/campaigns ...","");try{const url="/api/klaviyo/campaigns?date_range="+encodeURIComponent(dateRange);const res=await fetch(url,{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Klaviyo campaigns test failed.");setStatus("Success. Klaviyo campaigns received.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Run Campaigns"}}async function runKlaviyoInsightsTest(){const btn=document.getElementById("insightsBtn");btn.disabled=true;btn.textContent="Running...";const dateRange=document.getElementById("dateRange").value;const limit=document.getElementById("limit").value||"25";setStatus("Calling /api/klaviyo/insights ...","");try{const url="/api/klaviyo/insights?date_range="+encodeURIComponent(dateRange)+"&limit="+encodeURIComponent(limit);const res=await fetch(url,{headers:authHeaders()});const data=await res.json().catch(()=>({}));printJson(data);if(!res.ok)throw new Error(data.error||"Klaviyo insights test failed.");setStatus("Success. Klaviyo insights received.","ok")}catch(e){setStatus(e.message,"err")}finally{btn.disabled=false;btn.textContent="Run Insights"}}async function copyJson(){try{await navigator.clipboard.writeText(JSON.stringify(lastJson,null,2));setStatus("JSON copied.","ok")}catch(e){setStatus("Could not copy JSON.","err")}}init();</script></body></html>
