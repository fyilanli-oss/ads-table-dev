<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create AdsTable Account</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#fff;color:#111}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:440px}
.logo{text-align:center;font-size:32px;font-weight:950;letter-spacing:-1px;margin-bottom:38px}
h1{text-align:center;font-size:40px;letter-spacing:-.05em;margin:0 0 36px;line-height:1.08}
.field{margin-bottom:16px}
input{width:100%;height:58px;border:1px solid #ddd;border-radius:16px;padding:0 18px;font-size:18px}
.btn{width:100%;height:58px;border:0;border-radius:16px;background:#111;color:#fff;font-size:19px;font-weight:850;margin-top:14px;cursor:pointer}
.btn:disabled{opacity:.55;cursor:not-allowed}
.links{display:flex;justify-content:center;gap:30px;margin-top:32px;color:#777;font-size:17px;flex-wrap:wrap}
.links a{color:#777;text-decoration:none}
.legal{text-align:center;color:#777;line-height:1.6;margin-top:28px;font-size:15px}
.legal a{color:#111;font-weight:800;text-decoration:none}
.msg{text-align:center;color:#9b111e;margin-top:14px;font-size:14px;line-height:1.45}
.ok{text-align:center;color:#0f6b37;margin-top:14px;font-size:14px;line-height:1.45}
.googleBtn{width:100%;height:58px;border:1px solid #ddd;border-radius:16px;background:#fff;color:#111;font-size:18px;font-weight:850;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer}.googleIcon{width:20px;height:20px;display:block}.orLine{display:flex;align-items:center;gap:12px;margin:20px 0 6px;color:#999;font-size:13px;font-weight:850}.orLine:before,.orLine:after{content:"";height:1px;background:#eee;flex:1}</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">AdsTable</div>
    <h1>Create your AdsTable account</h1>

    <div class="field">
      <input id="name" name="name" autocomplete="name" placeholder="Name"/>
    </div>

    <div class="field">
      <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address"/>
    </div>

    <div class="field">
      <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Password"/>
    </div>

    <button id="createBtn" class="btn" type="button">Create account</button><div class="orLine">or</div><button id="googleSignupBtn" class="googleBtn" type="button"><svg class="googleIcon" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.1 26.8 36 24 36c-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.4 39.4 16.1 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.3 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/></svg><span>Continue with Google</span></button>

    <div id="msg" class="msg"></div>
    <div id="ok" class="ok"></div>

    <div class="legal">
      By creating an account, you agree to our<br>
      <a href="/privacy">Privacy Policy</a> and <a href="/terms">Terms of Service</a>.
    </div>

    <div class="links">
      <span>Already have an account?</span>
      <a href="/login">Sign In</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let client = null;

function el(id) {
  return document.getElementById(id);
}

function showMsg(text) {
  el("msg").textContent = text || "";
  el("ok").textContent = "";
}

function showOk(text) {
  el("ok").textContent = text || "";
  el("msg").textContent = "";
}

async function init() {
  try {
    const res = await fetch("/api/public-config");
    const cfg = await res.json();

    if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
      showMsg("Supabase config is missing. Check SUPABASE_URL and SUPABASE_ANON_KEY.");
      return;
    }

    client = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  } catch (err) {
    showMsg("Could not load Supabase config: " + err.message);
  }
}

async function continueWithGoogle() {
  showMsg("");

  if (!client) {
    showMsg("Supabase is not ready yet. Refresh the page and try again.");
    return;
  }

  const { error } = await client.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/dashboard"
    }
  });

  if (error) showMsg(error.message);
}

async function createAccount() {
  showMsg("");

  if (!client) {
    showMsg("Supabase is not ready yet. Refresh the page and try again.");
    return;
  }

  const name = (el("name") && el("name").value ? el("name").value : "").trim();
  const email = (el("email") && el("email").value ? el("email").value : "").trim();
  const password = el("password") && el("password").value ? el("password").value : "";

  if (!name) return showMsg("Please enter your name.");
  if (!email) return showMsg("Please enter your email address.");
  if (!password || password.length < 8) return showMsg("Password must be at least 8 characters.");

  const btn = el("createBtn");
  btn.disabled = true;
  btn.textContent = "Creating...";

  try {
    const { data, error } = await client.auth.signUp({
      email,
      password,
      options: {
        data: { name }
      }
    });

    if (error) {
      showMsg(error.message);
      return;
    }

    const { data: sessionData } = await client.auth.getSession();

    if (sessionData && sessionData.session) {
      window.location.href = "/dashboard";
    } else {
      showOk("Account created. Please sign in.");
      setTimeout(() => window.location.href = "/login", 900);
    }
  } catch (err) {
    showMsg(err.message || "Signup failed.");
  } finally {
    btn.disabled = false;
    btn.textContent = "Create account";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  el("createBtn").addEventListener("click", createAccount);
  el("googleSignupBtn").addEventListener("click", continueWithGoogle);
  init();
});
</script>
</body>
</html>
