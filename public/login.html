<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to AdsTable</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#fff;color:#111}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:440px}.logo{text-align:center;font-size:32px;font-weight:950;letter-spacing:-1px;margin-bottom:38px}h1{text-align:center;font-size:40px;letter-spacing:-.05em;margin:0 0 36px}input{width:100%;height:58px;border:1px solid #ddd;border-radius:16px;padding:0 18px;font-size:18px;margin-bottom:16px}.btn{width:100%;height:58px;border:0;border-radius:16px;background:#111;color:#fff;font-size:19px;font-weight:850;margin-top:14px}.links{display:flex;justify-content:center;gap:30px;margin-top:32px;color:#777;font-size:17px}.links a{color:#777;text-decoration:none}.msg{text-align:center;color:#9b111e;margin-top:14px;font-size:14px}</style></head><body><div class="wrap"><div class="card"><div class="logo">AdsTable</div><h1>Sign in to AdsTable</h1><input id="email" placeholder="Email address"><input id="password" type="password" placeholder="Password"><button class="btn" onclick="login()">Sign in</button><div id="msg" class="msg"></div><div class="links"><a href="#" onclick="forgot()">Forgot your password?</a><a href="/signup">Get Started</a></div></div></div><script>
let client;
let recoveryMode = false;
let confirmPasswordInput = null;

async function init(){
  const cfg=await fetch('/api/public-config').then(r=>r.json());
  client=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);
  const params = new URLSearchParams(window.location.search);
  const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
  recoveryMode = params.get('reset') === '1' || hashParams.get('type') === 'recovery';
  if(recoveryMode){ enterRecoveryMode(); }
}

function showMsg(t, ok){
  msg.textContent=t||'';
  msg.style.color = ok ? '#0f6b37' : '#9b111e';
}

function enterRecoveryMode(){
  const title = document.querySelector('h1');
  if(title) title.textContent = 'Reset your password';
  email.style.display='none';
  password.placeholder='New password';
  password.value='';
  confirmPasswordInput = document.createElement('input');
  confirmPasswordInput.id='confirmPassword';
  confirmPasswordInput.type='password';
  confirmPasswordInput.placeholder='Confirm new password';
  password.insertAdjacentElement('afterend', confirmPasswordInput);
  const btn = document.querySelector('.btn');
  if(btn) btn.textContent='Save password';
  const links = document.querySelector('.links');
  if(links) links.style.display='none';
  showMsg('Enter your new password.', true);
}

async function login(){
  showMsg('');
  if(recoveryMode){ return saveRecoveredPassword(); }
  const {error}=await client.auth.signInWithPassword({email:email.value.trim(),password:password.value});
  if(error){showMsg(error.message);return}
  location.href='/dashboard'
}

async function saveRecoveredPassword(){
  const newPassword = password.value || '';
  const confirmPassword = confirmPasswordInput ? confirmPasswordInput.value : '';
  if(!newPassword) return showMsg('New password is required.');
  if(newPassword.length < 8) return showMsg('Password must be at least 8 characters.');
  if(newPassword !== confirmPassword) return showMsg('Passwords do not match.');
  const { error } = await client.auth.updateUser({ password: newPassword });
  if(error){ showMsg(error.message); return; }
  showMsg('Saved. Please sign in.', true);
  setTimeout(function(){ location.href='/login'; }, 900);
}

async function forgot(){
  showMsg('');
  const userEmail = email.value.trim();
  if(!userEmail){ showMsg('Please enter your email address.'); return; }
  const redirectTo = window.location.origin + '/login?reset=1';
  const { error } = await client.auth.resetPasswordForEmail(userEmail, { redirectTo });
  if(error){ showMsg(error.message); return; }
  showMsg('Password reset email sent. Check your email.', true);
}
init()
</script></body></html>
