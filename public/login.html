<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to AdsTable</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#fff;color:#111}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:440px}.logo{text-align:center;font-size:32px;font-weight:950;letter-spacing:-1px;margin-bottom:38px}h1{text-align:center;font-size:40px;letter-spacing:-.05em;margin:0 0 36px}input{width:100%;height:58px;border:1px solid #ddd;border-radius:16px;padding:0 18px;font-size:18px;margin-bottom:16px}.btn{width:100%;height:58px;border:0;border-radius:16px;background:#111;color:#fff;font-size:19px;font-weight:850;margin-top:14px}.links{display:flex;justify-content:center;gap:30px;margin-top:32px;color:#777;font-size:17px}.links a{color:#777;text-decoration:none}.msg{text-align:center;color:#9b111e;margin-top:14px;font-size:14px}.resetBox{display:none}.resetBox.open{display:block}.mainBox.hidden{display:none}.resetTitle{text-align:center;font-size:34px;letter-spacing:-.05em;margin:0 0 26px}.smallText{text-align:center;color:#777;line-height:1.45;margin:0 0 18px;font-size:15px}.backLink{display:block;text-align:center;color:#777;text-decoration:none;margin-top:22px;font-size:16px}.okmsg{text-align:center;color:#0f6b37;margin-top:14px;font-size:14px}.resetBox input{margin-bottom:16px}</style></head><body><div class="wrap"><div class="card"><div class="logo">AdsTable</div>
<div id="loginBox" class="mainBox">
<h1>Sign in to AdsTable</h1>
<input id="email" placeholder="Email address">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Sign in</button>
<div id="msg" class="msg"></div>
<div id="okmsg" class="okmsg"></div>
<div class="links"><a href="#" onclick="openForgot(event)">Forgot your password?</a><a href="/signup">Get Started</a></div>
</div>

<div id="forgotBox" class="resetBox">
<h1 class="resetTitle">Reset Password</h1>
<p class="smallText">Enter your email address and we will send you a password reset link.</p>
<input id="resetEmail" type="email" placeholder="Email address">
<button class="btn" onclick="sendResetLink()">Send Reset Link</button>
<div id="resetMsg" class="msg"></div>
<div id="resetOk" class="okmsg"></div>
<a class="backLink" href="#" onclick="showLogin(event)">Back to Sign In</a>
</div>

<div id="newPasswordBox" class="resetBox">
<h1 class="resetTitle">New Password</h1>
<p class="smallText">Enter your new password.</p>
<input id="newResetPassword" type="password" placeholder="New Password">
<input id="confirmResetPassword" type="password" placeholder="Confirm New Password">
<button class="btn" onclick="saveResetPassword()">Save Password</button>
<div id="newResetMsg" class="msg"></div>
<div id="newResetOk" class="okmsg"></div>
</div></div></div><script id="phase-c-login-account-management">
let client;
let recoveryMode=false;

async function init(){
  const cfg=await fetch('/api/public-config').then(r=>r.json());
  client=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);
  const hash=window.location.hash||"";
  const params=new URLSearchParams(window.location.search);
  if(params.get("reset")==="1" || hash.includes("type=recovery") || hash.includes("access_token")){
    const s=await client.auth.getSession();
    recoveryMode=true;
    showNewPassword();
  }
}

function showMsg(t){msg.textContent=t||''; if(window.okmsg) okmsg.textContent=''}
function showOk(t){if(window.okmsg) okmsg.textContent=t||''; msg.textContent=''}
function setResetMsg(t){resetMsg.textContent=t||''; resetOk.textContent=''}
function setResetOk(t){resetOk.textContent=t||''; resetMsg.textContent=''}
function setNewResetMsg(t){newResetMsg.textContent=t||''; newResetOk.textContent=''}
function setNewResetOk(t){newResetOk.textContent=t||''; newResetMsg.textContent=''}

function hideAll(){
  loginBox.classList.add("hidden");
  forgotBox.classList.remove("open");
  newPasswordBox.classList.remove("open");
}
function showLogin(e){
  if(e)e.preventDefault();
  hideAll();
  loginBox.classList.remove("hidden");
}
function openForgot(e){
  if(e)e.preventDefault();
  hideAll();
  forgotBox.classList.add("open");
  resetEmail.focus();
}
function showNewPassword(){
  hideAll();
  newPasswordBox.classList.add("open");
  newResetPassword.focus();
}

async function login(){
  showMsg('');
  const {error}=await client.auth.signInWithPassword({email:email.value.trim(),password:password.value});
  if(error){showMsg(error.message);return}
  location.href='/dashboard'
}

async function sendResetLink(){
  setResetMsg("");
  const email=(resetEmail.value||"").trim();
  if(!email){setResetMsg("Please enter your email address.");return}
  const {error}=await client.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin + "/login?reset=1"});
  if(error){setResetMsg(error.message);return}
  setResetOk("Password reset link sent. Check your email.");
}

async function saveResetPassword(){
  setNewResetMsg("");
  const p1=newResetPassword.value||"";
  const p2=confirmResetPassword.value||"";
  if(!p1){setNewResetMsg("New password is required.");return}
  if(p1.length<8){setNewResetMsg("Password must be at least 8 characters.");return}
  if(p1!==p2){setNewResetMsg("Passwords do not match.");return}
  const {error}=await client.auth.updateUser({password:p1});
  if(error){setNewResetMsg(error.message);return}
  setNewResetOk("Password updated. Please sign in.");
  setTimeout(async function(){
    await client.auth.signOut();
    window.location.href="/login";
  },1200);
}

init()
</script></body></html>
