<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AdsTable Google Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f6f6f6;color:#111}
.wrap{max-width:980px;margin:0 auto;padding:24px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.logo{font-size:28px;font-weight:950;letter-spacing:-1px}
.card{background:#fff;border:1px solid #ddd;border-radius:22px;padding:20px;margin-bottom:16px}
h1{font-size:34px;letter-spacing:-.05em;margin:0 0 8px}
p{color:#666;line-height:1.5}
.btn{border:0;background:#111;color:#fff;border-radius:14px;padding:14px 18px;font-weight:900;cursor:pointer}
.btn:disabled{opacity:.55;cursor:not-allowed}
.secondary{background:#fff;color:#111;border:1px solid #ddd}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
pre{white-space:pre-wrap;word-break:break-word;background:#111;color:#fff;border-radius:18px;padding:18px;min-height:240px;overflow:auto;font-size:13px;line-height:1.45}
.status{font-weight:850;margin-top:10px}
.ok{color:#0f6b37}
.err{color:#9b111e}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">AdsTable</div>
    <button class="btn secondary" onclick="location.href='/dashboard'">Back to Dashboard</button>
  </div>

  <div class="card">
    <h1>Google Ads API Test</h1>
    <p>This page calls <b>/api/google/customers</b> with the active Supabase session token and prints the raw JSON response.</p>

    <div class="row">
      <button id="testBtn" class="btn" onclick="runGoogleCustomersTest()">Run Google Customers Test</button>
      <button class="btn secondary" onclick="copyJson()">Copy JSON</button>
    </div>

    <div id="status" class="status">Waiting...</div>
  </div>

  <div class="card">
    <pre id="output">{}</pre>
  </div>
</div>

<script>
let supabaseClient = null;
let session = null;
let lastJson = {};

function setStatus(text, type) {
  const s = document.getElementById("status");
  s.textContent = text;
  s.className = "status " + (type || "");
}

function printJson(data) {
  lastJson = data;
  document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}

async function init() {
  try {
    const cfg = await fetch("/api/public-config").then(r => r.json());

    if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
      setStatus("Supabase config missing.", "err");
      return;
    }

    supabaseClient = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    const s = await supabaseClient.auth.getSession();
    session = s.data.session;

    if (!session) {
      setStatus("Not logged in. Redirecting to login...", "err");
      setTimeout(() => location.href = "/login", 900);
      return;
    }

    setStatus("Logged in. Ready to test Google.", "ok");
  } catch (e) {
    setStatus(e.message, "err");
  }
}

async function runGoogleCustomersTest() {
  const btn = document.getElementById("testBtn");
  btn.disabled = true;
  btn.textContent = "Running...";
  setStatus("Calling /api/google/customers ...", "");

  try {
    if (!session || !session.access_token) {
      throw new Error("Missing Supabase session token. Please login again.");
    }

    const res = await fetch("/api/google/customers", {
      headers: {
        "Authorization": "Bearer " + session.access_token,
        "Content-Type": "application/json"
      }
    });

    const data = await res.json().catch(() => ({}));
    printJson(data);

    if (!res.ok) {
      throw new Error(data.error || "Google customers test failed.");
    }

    setStatus("Success. Google customers response received.", "ok");
  } catch (e) {
    setStatus(e.message, "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Run Google Customers Test";
  }
}

async function copyJson() {
  try {
    await navigator.clipboard.writeText(JSON.stringify(lastJson, null, 2));
    setStatus("JSON copied.", "ok");
  } catch (e) {
    setStatus("Could not copy JSON.", "err");
  }
}

init();
</script>
</body>
</html>
